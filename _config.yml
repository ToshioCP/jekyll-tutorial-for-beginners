# Site settings
title: 縺ｯ縺倥ａ縺ｦ縺ｮJekyll + GitHub Pages
author: "Toshio Sekiya"
description: Jekyll縺ｨGitHub Pages繧剃ｽｿ縺｣縺ｦ髱咏噪繧ｦ繧ｧ繝悶し繧､繝医ｒ菴懊ｋ
domain: "toshiocp.github.io"
url: "https://toshiocp.github.io"
baseurl: "/jekyll-tutorial-for-beginners"
github_username: toshiocp
lang: ja

# Build settings
# ---- GitHub Pages requires the following settings ----
lsi: false
safe: true
incremental: false
highlighter: rouge
gist:
  noscript: false
kramdown:
  math_engine: mathjax
  syntax_highlighter: rouge
# ------------------------------------------------------

plugins:
  - jekyll-feed

collections:
  sections:
    output: true

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - .ruby-version
  - mise.toml
  - .jekyll-cache

# Cayman theme settings
theme: jekyll-theme-cayman
show_downloads: true
